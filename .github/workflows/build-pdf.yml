name: Build Resume PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra

      - name: Build PDF
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error soundarya_resume1.tex
          pdflatex -interaction=nonstopmode -halt-on-error soundarya_resume1.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: soundarya_resume1.pdf
